name: Trigger Render Deploy

on:
  push:
    branches:
      - main

jobs:
  trigger-render-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Render deployment
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "RENDER_API_KEY and RENDER_SERVICE_ID must be set in repo secrets"
            exit 1
          fi

          echo "Triggering Render deploy for service: $RENDER_SERVICE_ID"

          response=$(curl -s -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")

          echo "Render response: $response"

          success=$(echo "$response" | jq -r '.id // empty')
          if [ -z "$success" ]; then
            echo "Failed to create deploy. Response:"; echo "$response"
            exit 1
          fi

          echo "Deploy created with id: $success"
